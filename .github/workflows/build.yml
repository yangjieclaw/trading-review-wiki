name: Build Windows
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build
      - name: Build
        run: |
          Remove-Item -Recurse -Force src-tauri/.cargo -ErrorAction SilentlyContinue
          $env:PROTOC = "$env:GITHUB_WORKSPACE\.protoc\bin\protoc.exe"
          npx tauri build --bundles msi
      - uses: actions/upload-artifact@v4
        with:
          name: trading-review-wiki-windows
          path: src-tauri/target/release/bundle/msi/*.msi
