name: Build Windows
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        env:
          PROTOC: ${{ github.workspace }}\.protoc\bin\protoc.exe
        run: |
          # Remove USTC mirror which can't be reached from GitHub Actions
          del /F /Q src-tauri\.cargo\config.toml 2>nul
          npx tauri build --bundles msi

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: trading-review-wiki-windows
          path: src-tauri/target/release/bundle/msi/*.msi
