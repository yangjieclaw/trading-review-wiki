name: Build Windows
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        env:
          PROTOC: ${{ github.workspace }}\.protoc\bin\protoc.exe
        run: |
          # Remove USTC mirror which can't be reached from GitHub Actions
          del /F /Q src-tauri\.cargo\config.toml 2>nul
          npx tauri build --bundles msi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.10.6
          files: src-tauri/target/release/bundle/msi/*.msi
          body: |
            - UI: 知识树/文件树和对话切换图标
            - Save to Wiki: 弹窗选标题和目录
            - 编译修复: PROTOC + USTC镜像
          fail_on_unmatched_files: false
